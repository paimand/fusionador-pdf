<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unir PDF online | Combina tus archivos PDF en uno</title>

    <!-- Dependencias externas -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
    </script>

    <style>
        /* ===== RESET Y ESTILOS BASE ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f2f4f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .container {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            padding: 48px 40px 40px;
            transition: box-shadow 0.2s;
        }

        /* ===== HEADER ===== */
        .tool__header {
            text-align: center;
            margin-bottom: 32px;
        }

        .tool__header__title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #1d1d1f;
            margin-bottom: 6px;
        }

        .tool__header__subtitle {
            font-size: 18px;
            font-weight: 400;
            color: #6e6e73;
            margin-top: 4px;
        }

        /* ===== ÁREA DE SUBIDA (DROP ZONE) ===== */
        .uploader {
            border: 2px dashed #d2d2d7;
            border-radius: 18px;
            padding: 48px 24px;
            text-align: center;
            background: #fafafc;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 28px;
            position: relative;
        }

        .uploader:hover {
            background: #f5f5fa;
            border-color: #0071e3;
        }

        .uploader.dragover {
            background: #e8f1ff;
            border-color: #0071e3;
        }

        .uploader__icon {
            display: inline-block;
            margin-bottom: 12px;
        }

        .uploader__icon svg {
            width: 48px;
            height: 48px;
            fill: #0071e3;
        }

        .uploader__text {
            font-size: 18px;
            font-weight: 500;
            color: #1d1d1f;
        }

        .uploader__text span {
            color: #0071e3;
            text-decoration: underline;
            text-underline-offset: 3px;
            font-weight: 600;
        }

        .uploader__droptxt {
            font-size: 15px;
            color: #86868b;
            margin-top: 6px;
        }

        .uploader input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* ===== BARRA DE PROGRESO (opcional) ===== */
        .uploading__bar {
            width: 100%;
            height: 4px;
            background: #e5e5ea;
            border-radius: 4px;
            margin-bottom: 24px;
            overflow: hidden;
            visibility: hidden;
        }

        .uploading__bar--active {
            visibility: visible;
        }

        .uploading__bar__completed {
            display: block;
            height: 100%;
            width: 0%;
            background: #0071e3;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* ===== LISTA DE ARCHIVOS ===== */
        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .file-list-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .file-list-header .file-count {
            font-size: 15px;
            color: #86868b;
            font-weight: 400;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0 0 28px 0;
            border: 1px solid #e5e5ea;
            border-radius: 14px;
            background: #fafafc;
            min-height: 70px;
        }

        .file-list li {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f2;
            cursor: grab;
            transition: background 0.15s;
            border-radius: 14px 14px 0 0;
        }

        .file-list li:last-child {
            border-bottom: none;
            border-radius: 0 0 14px 14px;
        }

        .file-list li:hover {
            background: #f8f8fc;
        }

        .file-list li.sortable-ghost {
            opacity: 0.4;
            background: #e8f1ff;
            border: 1px dashed #0071e3;
        }

        .file-list li .thumbnail {
            flex-shrink: 0;
            width: 60px;
            height: 80px;
            background: #f0f0f2;
            border: 1px solid #e5e5ea;
            border-radius: 6px;
            overflow: hidden;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-list li .thumbnail canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .file-list li .file-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .file-list li .file-name {
            font-weight: 500;
            color: #1d1d1f;
            font-size: 15px;
        }

        .file-list li .file-meta {
            font-size: 13px;
            color: #86868b;
        }

        .file-list li .delete-btn {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 22px;
            cursor: pointer;
            padding: 0 8px;
            line-height: 1;
            transition: color 0.15s;
            border-radius: 6px;
        }

        .file-list li .delete-btn:hover {
            color: #ff3b30;
            background: #fff0ef;
        }

        /* ===== BOTONES DE ACCIÓN ===== */
        .actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }

        .btn {
            padding: 14px 36px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #0071e3;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 113, 227, 0.25);
        }

        .btn-primary:hover {
            background: #005bbf;
            box-shadow: 0 4px 14px rgba(0, 113, 227, 0.35);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-secondary {
            background: #f0f0f2;
            color: #1d1d1f;
        }

        .btn-secondary:hover {
            background: #e5e5ea;
        }

        /* ===== LOADING ===== */
        #loading {
            margin-top: 24px;
            font-size: 16px;
            color: #0071e3;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        #loading.show {
            display: block;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .container {
                padding: 24px 16px 28px;
            }

            .tool__header__title {
                font-size: 26px;
            }

            .tool__header__subtitle {
                font-size: 16px;
            }

            .uploader {
                padding: 32px 16px;
            }

            .uploader__text {
                font-size: 16px;
            }

            .file-list li {
                padding: 10px 12px;
                flex-wrap: wrap;
            }

            .file-list li .thumbnail {
                width: 48px;
                height: 64px;
                margin-right: 12px;
            }

            .btn {
                padding: 12px 24px;
                font-size: 15px;
                width: 100%;
                justify-content: center;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <div class="tool__header">
            <h1 class="tool__header__title">Unir archivos PDF</h1>
            <h2 class="tool__header__subtitle">Une PDFs y ponlos en el orden que prefieras. ¡Rápido y fácil!</h2>
        </div>

        <!-- UPLOADER (DROP ZONE) -->
        <div class="uploader" id="dropZone">
            <div class="uploader__icon">
                <svg viewBox="0 0 24 24" width="48" height="48">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/>
                    <path d="M12 11v6M9 14l3 3 3-3"/>
                </svg>
            </div>
            <div class="uploader__text">
                <span>Seleccionar archivos PDF</span>
            </div>
            <div class="uploader__droptxt">o arrastra y suelta los PDF aquí</div>
            <input type="file" id="fileInput" accept=".pdf" multiple>
        </div>

        <!-- BARRA DE PROGRESO (opcional) -->
        <div class="uploading__bar" id="progressBar">
            <span class="uploading__bar__completed" id="progressFill"></span>
        </div>

        <!-- LISTA DE ARCHIVOS -->
        <div class="file-list-header">
            <h2>Archivos seleccionados</h2>
            <span class="file-count" id="fileCount">0 archivos</span>
        </div>
        <ul id="fileList" class="file-list"></ul>

        <!-- BOTONES -->
        <div class="actions">
            <button id="clearBtn" class="btn btn-secondary">Vaciar lista</button>
            <button id="mergeBtn" class="btn btn-primary">🔗 Unir PDFs</button>
        </div>

        <!-- LOADING -->
        <div id="loading">Procesando... Por favor espera.</div>

    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN DE PDF.JS
        // ============================================================
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // ============================================================
        // DOM ELEMENTS
        // ============================================================
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileListEl = document.getElementById('fileList');
        const fileCountSpan = document.getElementById('fileCount');
        const mergeBtn = document.getElementById('mergeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loadingDiv = document.getElementById('loading');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        // ============================================================
        // ESTADO
        // ============================================================
        let fileList = [];

        // ============================================================
        // SORTABLE (arrastre)
        // ============================================================
        const sortable = new Sortable(fileListEl, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: function(evt) {
                const [moved] = fileList.splice(evt.oldIndex, 1);
                fileList.splice(evt.newIndex, 0, moved);
                updateFileCount();
            }
        });

        // ============================================================
        // FUNCIONES AUXILIARES
        // ============================================================
        function updateFileCount() {
            const count = fileList.length;
            fileCountSpan.textContent = count === 0 ? '0 archivos' :
                count === 1 ? '1 archivo' :
                `${count} archivos`;
        }

        function clearList() {
            fileList = [];
            fileListEl.innerHTML = '';
            updateFileCount();
            fileInput.value = '';
            progressBar.classList.remove('uploading__bar--active');
            progressFill.style.width = '0%';
        }

        function removeFile(index) {
            fileList.splice(index, 1);
            renderList();
        }

        // ============================================================
        // RENDERIZAR LISTA
        // ============================================================
        function renderList() {
            fileListEl.innerHTML = '';
            fileList.forEach((file, index) => {
                const li = createListItem(file, index);
                fileListEl.appendChild(li);
            });
            updateFileCount();
        }

        function createListItem(file, index) {
            const li = document.createElement('li');
            li.dataset.index = index;

            // Miniatura
            const thumbDiv = document.createElement('div');
            thumbDiv.className = 'thumbnail';
            const canvas = document.createElement('canvas');
            thumbDiv.appendChild(canvas);
            li.appendChild(thumbDiv);

            // Info
            const infoDiv = document.createElement('div');
            infoDiv.className = 'file-info';
            const nameSpan = document.createElement('span');
            nameSpan.className = 'file-name';
            nameSpan.textContent = file.name;
            const metaSpan = document.createElement('span');
            metaSpan.className = 'file-meta';
            const sizeKB = (file.size / 1024).toFixed(1);
            metaSpan.textContent = `${sizeKB} KB`;
            infoDiv.appendChild(nameSpan);
            infoDiv.appendChild(metaSpan);
            li.appendChild(infoDiv);

            // Botón eliminar
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '×';
            delBtn.title = 'Eliminar este archivo';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                removeFile(index);
            });
            li.appendChild(delBtn);

            // Generar miniatura
            generateThumbnail(file, canvas);

            return li;
        }

        // ============================================================
        // GENERAR MINIATURA (PDF.js)
        // ============================================================
        async function generateThumbnail(file, canvas) {
            try {
                const arrayBuffer = await readFileAsArrayBuffer(file);
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const page = await pdf.getPage(1);
                const scale = 0.5;
                const viewport = page.getViewport({ scale });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const context = canvas.getContext('2d');
                await page.render({ canvasContext: context, viewport }).promise;
            } catch (_) {
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#f0f0f2';
                ctx.fillRect(0, 0, canvas.width || 60, canvas.height || 80);
                ctx.fillStyle = '#86868b';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Sin vista previa', (canvas.width || 60) / 2, (canvas.height || 80) / 2);
            }
        }

        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e.target.error);
                reader.readAsArrayBuffer(file);
            });
        }

        // ============================================================
        // MANEJO DE ARCHIVOS
        // ============================================================
        function handleFiles(files) {
            if (!files || files.length === 0) return;

            const pdfFiles = Array.from(files).filter(f =>
                f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf')
            );

            if (pdfFiles.length === 0) {
                alert('Por favor selecciona solo archivos PDF.');
                return;
            }

            // Simular progreso
            progressBar.classList.add('uploading__bar--active');
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                if (progress >= 100) {
                    clearInterval(interval);
                    progressFill.style.width = '100%';
                    setTimeout(() => {
                        progressBar.classList.remove('uploading__bar--active');
                        progressFill.style.width = '0%';
                    }, 400);
                } else {
                    progressFill.style.width = progress + '%';
                }
            }, 80);

            for (const file of pdfFiles) {
                fileList.push(file);
            }
            renderList();
            fileInput.value = '';
        }

        // ============================================================
        // EVENTOS
        // ============================================================
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        // Botón Vaciar
        clearBtn.addEventListener('click', clearList);

        // ============================================================
        // UNIR PDFs (fetch al servidor)
        // ============================================================
        mergeBtn.addEventListener('click', async () => {
            if (fileList.length === 0) {
                alert('No hay archivos para unir.');
                return;
            }

            mergeBtn.disabled = true;
            loadingDiv.classList.add('show');

            try {
                const formData = new FormData();
                for (const file of fileList) {
                    formData.append('pdfs', file);
                }

                const response = await fetch('/merge', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Error al fusionar');
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'merged.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (error) {
                alert('Error al fusionar: ' + error.message);
                console.error(error);
            } finally {
                mergeBtn.disabled = false;
                loadingDiv.classList.remove('show');
            }
        });

        // ============================================================
        // INICIALIZAR
        // ============================================================
        updateFileCount();
    </script>

</body>
</html>
