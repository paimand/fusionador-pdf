<!-- DIVIDIR -->
<div id="splitPanel" class="panel">
  <div class="upload-area" id="dropZoneSplit">
    <p>Arrastra o selecciona un PDF para dividir</p>
    <input type="file" id="fileInputSplit" accept=".pdf">
  </div>

  <div style="margin: 16px 0;">
    <label>
      <input type="radio" name="splitMode" value="individual" checked> Dividir en páginas individuales
    </label>
    <label style="margin-left: 20px;">
      <input type="radio" name="splitMode" value="ranges"> Dividir por rangos
    </label>
  </div>

  <!-- Vista previa de páginas (se muestra al cargar PDF) -->
  <div id="splitPreview" style="display:none; margin-bottom:16px;">
    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px;">
      <button id="splitSelectAll" class="btn btn-secondary" style="padding:6px 14px;">Seleccionar todas</button>
      <button id="splitDeselectAll" class="btn btn-secondary" style="padding:6px 14px;">Deseleccionar todas</button>
    </div>
    <div id="splitPageGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(100px,1fr)); gap:12px;"></div>
  </div>

  <!-- Campo de rangos (opcional) -->
  <div id="splitRangesContainer" style="display:none; margin-bottom:16px;">
    <label for="splitRanges">Rangos (ej. 1,3-5,7):</label>
    <input type="text" id="splitRanges" placeholder="Ej: 1,3-5,7" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;">
  </div>

  <div class="actions">
    <button id="splitBtn" class="btn btn-primary">✂️ Dividir</button>
  </div>
  <div id="splitStatus" style="margin-top:12px;"></div>
</div>
